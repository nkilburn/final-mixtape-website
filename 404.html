<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Made You A Mixtape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Permanent+Marker&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0d0d0f;
            --bg-dark: #141418;
            --text-primary: #f5f0eb;
            --text-secondary: rgba(245, 240, 235, 0.65);
            --text-tertiary: rgba(245, 240, 235, 0.4);
            --accent-primary: #b0c4de;
            --accent-secondary: #f5f0eb;
            --accent-tertiary: #64748b;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-medium: rgba(255, 255, 255, 0.14);
            --radius-sm: 10px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --radius-xl: 40px;
            --radius-full: 9999px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-hand: 'Permanent Marker', cursive;
            --font-pen: 'Caveat', cursive;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; background: var(--bg-deep); }
        body {
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding: 140px 20px 100px;
            position: relative;
        }

        .header-wrapper {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: calc(100% - 32px); max-width: 1100px;
        }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(20, 20, 24, 0.7); backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle); border-radius: 60px;
            padding: 12px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .header-logo {
            font-weight: 600; font-size: 0.95rem; letter-spacing: -0.01em;
            color: var(--text-primary); text-decoration: none;
            display: flex; align-items: center; gap: 10px; flex-shrink: 0;
            cursor: pointer;
        }
        .header-logo-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent-primary); box-shadow: 0 0 12px var(--accent-primary);
        }
        .header-nav { display: flex; align-items: center; gap: 4px; list-style: none; }
        .header-nav a {
            text-decoration: none; color: var(--text-secondary); font-weight: 500;
            font-size: 0.85rem; padding: 8px 16px; border-radius: var(--radius-full);
            transition: all 0.2s ease; letter-spacing: 0.01em; white-space: nowrap;
            cursor: pointer;
        }
        .header-nav a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        @media (max-width: 768px) {
            .header { padding: 10px 14px; border-radius: 50px; }
            .header-nav { display: none; }
            .header-logo { font-size: 0.9rem; }
            .header-wrapper { top: 10px; width: calc(100% - 20px); }
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            text-align: center;
            z-index: 2;
            position: relative;
        }
        .meter-image-container {
            position: relative;
            width: 280px;
            max-width: 90vw;
            aspect-ratio: 1 / 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 30px 60px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.08);
            background: #0a0a0c;
        }
        .meter-image-container img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .glass-overlay {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
            pointer-events: none;
        }

        .message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 380px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--text-primary);
            color: #0d0d0f;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 14px 28px;
            border-radius: var(--radius-full);
            text-decoration: none;
            transition: all 0.3s var(--ease-out-expo);
        }
        .btn-home:hover { background: rgba(255,255,255,0.85); transform: scale(1.04); }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-align: center;
        }
        .footer a { color: var(--text-secondary); text-decoration: none; }
        .footer a:hover { color: var(--text-primary); }

        @media (max-width: 500px) {
            .meter-image-container { width: 220px; }
        }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <header class="header">
            <a href="index.html" class="header-logo">
                <span class="header-logo-dot"></span>Made You A Mixtape
            </a>
            <ul class="header-nav">
                <li><a href="index.html#episodes">Episodes</a></li>
                <li><a href="index.html#blog">Blog</a></li>
                <li><a href="index.html#merch">Merch</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </header>
    </div>

    <div class="content">
        <div class="meter-image-container">
            <img src="vu-meter.png" alt="VU meter showing no signal">
            <div class="glass-overlay"></div>
        </div>
        <h2 style="font-size:2.4rem; font-weight:800; letter-spacing:-0.02em;">Uh-oh!! The Sound of Silence</h2>
        <p class="message">The needle isn't moving. This page is off the air. Let's get you back to the music.</p>
        <a href="index.html" class="btn-home">← Back to the Mixtape</a>
    </div>

    <div class="footer">
        <p>© 2026 Made You A Mixtape · <a href="index.html">Home</a> · <a href="index.html#episodes">Episodes</a></p>
    </div>
</body>
</html>
